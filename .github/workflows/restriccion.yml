name: Alerta restriccion vehicular

on:
  schedule:
    - cron: "0,30 0-2 * * *"
    - cron: "0,30 10-11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install requests beautifulsoup4

      - name: Revisar episodio, avisar y publicar status
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_restriccion.py

      - name: Commit data/ si cambio
        run: |
          git config user.name "restriccion-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "update status $(date -u +%FT%TZ)"
          git push
